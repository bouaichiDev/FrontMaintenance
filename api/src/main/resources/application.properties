spring.application.name=spring-jwt-api

# H2 Database configuration (self-contained, no external MySQL required)
spring.datasource.url=jdbc:h2:mem:maintenance_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

jwt.secret=${JWT_SECRET:MySuperSecretKeyForJwtAuthentication123456}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=${APP_UPLOAD_DIR:uploads}

springdoc.swagger-ui.path=/swagger-ui.html

server.port=8081